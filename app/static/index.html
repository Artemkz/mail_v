<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail V — Почтовый клиент</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">Mail<span>V</span></div>

      <div class="sidebar-main">
        <div class="section-title">Папки</div>
        <nav id="folder-list"></nav>
      </div>

      <div class="sidebar-footer">
        <button id="btn-settings" class="btn btn-secondary settings-toggle" type="button" aria-expanded="false">
          <span>⚙ Настройки</span>
          <span id="settings-badge" class="badge hidden"></span>
        </button>
        <div id="settings-panel" class="settings-panel hidden">
          <div class="section-title">Ящики</div>
          <div id="mailbox-list"></div>
          <div class="settings-actions">
            <button id="btn-add-mailbox" class="btn btn-primary" type="button">+ Добавить ящик</button>
            <button id="btn-collect" class="btn btn-secondary" type="button">Собрать письма</button>
            <button id="btn-consolidate" class="btn btn-secondary" type="button" title="Скопировать письма со всех ящиков в один">В один ящик</button>
            <button id="btn-organize" class="btn btn-secondary" type="button">Сортировать</button>
          </div>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <form id="search-form" class="search-form">
          <input
            id="search-input"
            type="search"
            placeholder="Поиск: минимум 3 символа на слово (например: сче опл)"
            autocomplete="off"
          >
          <button class="btn btn-primary" type="submit">Найти</button>
        </form>
        <span class="search-hint">по первым 3 символам</span>
        <button id="btn-logout" class="btn btn-secondary" type="button">Выйти</button>
      </header>

      <div class="content">
        <div class="messages-pane">
          <div class="message-toolbar">
            <label class="toolbar-check">
              <input id="select-all" type="checkbox">
              <span>Все</span>
            </label>
            <div id="bulk-actions" class="bulk-actions hidden">
              <button id="bulk-read" class="btn btn-secondary btn-sm" type="button">Прочитано</button>
              <button id="bulk-unread" class="btn btn-secondary btn-sm" type="button">Непрочитано</button>
              <button id="bulk-star" class="btn btn-secondary btn-sm" type="button">★</button>
              <button id="bulk-archive" class="btn btn-secondary btn-sm" type="button">В архив</button>
              <select id="bulk-move-folder" class="toolbar-select">
                <option value="">Переместить...</option>
              </select>
              <button id="bulk-delete" class="btn btn-danger btn-sm" type="button">Удалить</button>
            </div>
            <button id="btn-mark-all-read" class="btn btn-secondary btn-sm" type="button">Прочитать все</button>
          </div>
          <div id="message-list" class="message-list"></div>
        </div>
        <article id="message-detail" class="message-detail empty">
          <p>Выберите письмо</p>
        </article>
      </div>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-labelledby="modal-title">
      <h2 id="modal-title">Добавить IMAP-ящик</h2>
      <form id="mailbox-form" class="form-grid">
        <label>
          Название
          <input name="name" required placeholder="Gmail">
        </label>
        <label>
          Email
          <input name="email" type="email" required placeholder="user@gmail.com">
        </label>
        <div class="form-row">
          <label>
            IMAP-хост
            <input name="imap_host" required placeholder="imap.gmail.com">
          </label>
          <label>
            Порт
            <input name="imap_port" type="number" value="993" required>
          </label>
        </div>
        <label>
          <input name="imap_ssl" type="checkbox" checked> Использовать SSL
        </label>
        <label>
          <input name="is_active" type="checkbox" checked> Ящик активен (участвует в сборе)
        </label>
        <label>
          Логин
          <input name="username" required placeholder="user@gmail.com">
        </label>
        <label>
          Пароль
          <input name="password" type="password" placeholder="Пароль IMAP">
          <span id="password-hint" class="field-hint hidden">Оставьте пустым, чтобы не менять пароль</span>
        </label>
        <label>
          Папка
          <input name="source_folder" value="INBOX" placeholder="INBOX">
        </label>
        <div class="modal-actions">
          <button id="btn-close-modal" class="btn btn-secondary" type="button">Отмена</button>
          <button class="btn btn-primary" type="submit">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="static/js/app.js"></script>
</body>
</html>
