<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Mail V</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="logo login-logo">Mail<span>V</span></div>
    <p class="login-subtitle">Войдите в почтовый клиент</p>

    <form id="login-form" class="form-grid">
      <label>
        Логин
        <input name="username" required autocomplete="username" placeholder="admin">
      </label>
      <label>
        Пароль
        <input name="password" type="password" required autocomplete="current-password" placeholder="••••••••">
      </label>
      <button class="btn btn-primary login-btn" type="submit">Войти</button>
    </form>

    <p id="login-error" class="login-error hidden"></p>
  </div>

  <script src="static/js/login.js"></script>
</body>
</html>
